services:
   postgres:
      image: postgres:16-alpine
      container_name: income_tracker_db
      restart: unless-stopped
      environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: postgres
         POSTGRES_DB: income_tracker
      ports:
         - "5432:5432"
      volumes:
         - income_tracker_db:/var/lib/postgresql/data

volumes:
   income_tracker_db:
